name: Fortalecimiento del modelo (quincenal)

# Corre cada ~15 días (días 1 y 16 de cada mes, 12:00 UTC) y también a demanda.
# NOTA: GitHub solo ejecuta 'schedule' desde la rama por defecto del repo.
on:
  schedule:
    - cron: "0 12 1,16 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install --quiet "anthropic>=0.69"

      - name: Generar reporte (investigación + propuestas)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python research/updates/generate_report.py

      - name: Commit del reporte al códice
        run: |
          git config user.name "lapuerta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add research/updates CLAUDE.md
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."
          else
            git commit -m "Reporte quincenal de fortalecimiento del modelo ($(date +%F))"
            git push
          fi
