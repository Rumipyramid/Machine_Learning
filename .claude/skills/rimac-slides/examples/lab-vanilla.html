/* ===== TOKENS (design.md) ===== */
:root{
  --primary:#0B1620; --text:#1F2937; --secondary:#6B7280; --tertiary:#F7052D;
  --neutral:#FFFFFF; --accent-orange:#FF7A00; --accent-magenta:#C8128B;
  --bg-section:#ECEEFC; --bg-soft:#F5F6FB; --bg-warm-soft:#FFF6EF; --bg-cool-soft:#F7F8FE;
  --bg-viewport:#F2F3F7; --line:#E5E7EB;
  --grad-hero:linear-gradient(90deg,#FF7A00 0%,#F7052D 45%,#C8128B 100%);
  --ease:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ width:100%; height:100%; overflow:hidden; background:var(--bg-viewport);
  font-family:'BRSonoma Regular','Helvetica Neue',Helvetica,Arial,sans-serif; font-synthesis:none; }

/* ===== STAGE 1920×1080 (marco bloqueado) ===== */
.viewport{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg-viewport); }
.stage{ width:1920px; height:1080px; min-width:1920px; min-height:1080px; flex-shrink:0; position:relative;
  transform-origin:center; background:var(--neutral); overflow:hidden; box-shadow:0 20px 60px rgba(11,22,32,.12); }
.slide{ position:absolute; inset:0; padding:80px 100px 100px; background:var(--neutral);
  visibility:hidden; opacity:0; pointer-events:none; transition:opacity .45s var(--ease), visibility 0s linear .45s;
  display:flex; flex-direction:column; }
.slide.active{ visibility:visible; opacity:1; pointer-events:auto; transition:opacity .45s var(--ease), visibility 0s linear 0s; }

/* ===== ENCABEZADO + CARCASA (marco) — título franja superior, sin eyebrow (design.md) ===== */
.title{ font-family:'BRSonoma Bold',sans-serif; font-size:64px; line-height:1.05; letter-spacing:-.025em; color:var(--primary); max-width:1500px; }
.core{ flex:1; display:flex; flex-direction:column; justify-content:center; margin:auto 0; width:100%; }
.grad{ background:var(--grad-hero); -webkit-background-clip:text; background-clip:text; color:transparent; padding-right:.04em; }
.red{ color:var(--tertiary); }
.footer{ position:absolute; left:100px; bottom:50px; display:flex; align-items:center; gap:22px; z-index:10; }
.footer .logo svg{ width:132px; height:auto; display:block; }
.footer .sep{ width:1px; height:28px; background:var(--line); }
.footer .tag{ font-family:'BRSonoma Medium',sans-serif; font-size:16px; letter-spacing:.02em; color:var(--secondary); }
.pagenum{ position:absolute; right:100px; bottom:54px; font-family:'BRSonoma Medium',sans-serif; font-size:15px;
  letter-spacing:.04em; color:var(--secondary); z-index:10; }

/* ===== MOTION (riseIn) — entrada del título y el corazón ===== */
@keyframes riseIn{ from{ transform:translateY(28px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
.slide .reveal{ opacity:0; }
.slide.active .title.reveal{ animation:riseIn .7s var(--ease) both; }
.slide.active .core.reveal{ animation:riseIn .8s var(--ease) .12s both; }
@media (prefers-reduced-motion:reduce){
  .slide.active .reveal{ animation:none!important; opacity:1!important; }
  /* WAAPI/CSS en loop no lo frena el @media de .reveal → apagar el latido explícitamente (design.md §Técnica del corazón) */
  .bets .cell.win.in::after{ animation:none!important; }
}

/* ===== Excepción fondo oscuro (logo en negativo, design.md §Elevation) ===== */
.slide.dark{ background:var(--primary); }
.slide.dark .title{ color:var(--neutral); }
.slide.dark .footer .logo svg path{ fill:var(--neutral); }
.slide.dark .footer .tag{ color:rgba(255,255,255,.68); }
.slide.dark .footer .sep{ background:rgba(255,255,255,.25); }
.slide.dark .pagenum{ color:rgba(255,255,255,.6); }

/* ===========================================================
   CORAZONES (capa libre) — vanilla JS + HTML5/SVG + animación
   =========================================================== */

/* 1 · dato dominante animado (count-up) */
.stat-big{ font-family:'BRSonoma Black',sans-serif; font-size:300px; line-height:.86; letter-spacing:-.03em;
  display:inline-flex; align-items:baseline; }
.stat-big .pct{ font-size:.55em; }
.stat-say{ font-family:'BRSonoma Medium',sans-serif; font-size:34px; line-height:1.3; color:var(--text); max-width:1120px; margin-top:14px; }
.stat-say b{ color:var(--primary); font-family:'BRSonoma Bold',sans-serif; }
.stat-weeks{ display:flex; gap:8px; margin-top:34px; }
.stat-weeks .wk{ width:34px; height:14px; border-radius:7px; background:var(--line); transition:background .5s var(--ease), transform .5s var(--ease); transform-origin:left; }
.stat-weeks .wk.on{ background:var(--tertiary); }

/* 2 · proceso animado (loop vivo) */
.flow{ display:flex; align-items:center; gap:0; margin-top:10px; }
.flow .node{ display:flex; flex-direction:column; align-items:center; gap:18px; }
.flow .dot{ width:120px; height:120px; border-radius:999px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-family:'BRSonoma Bold',sans-serif; font-size:40px; color:var(--secondary);
  transition:all .45s var(--ease); background:var(--neutral); }
.flow .node.on .dot{ border-color:var(--tertiary); color:var(--tertiary); }
.flow .node.now .dot{ background:var(--tertiary); color:#fff; border-color:var(--tertiary); transform:scale(1.08); }
.flow .node .lbl{ font-family:'BRSonoma Bold',sans-serif; font-size:26px; color:var(--primary); }
.flow .node .sub{ font-family:'BRSonoma Regular',sans-serif; font-size:17px; color:var(--secondary); margin-top:-10px; }
.flow .link{ flex:1; height:3px; background:var(--line); position:relative; margin:0 18px; margin-bottom:54px; border-radius:2px; overflow:hidden; }
.flow .link .fill{ position:absolute; inset:0; width:0; background:var(--tertiary); transition:width .5s var(--ease); }
.flow .link.on .fill{ width:100%; }
.flow .back{ margin-top:30px; font-family:'BRSonoma Medium',sans-serif; font-size:18px; color:var(--secondary); display:flex; align-items:center; gap:10px; }
.flow .back .loop{ color:var(--tertiary); font-family:'BRSonoma Bold',sans-serif; }

/* 3 · comparativa (barras animadas) */
.cmp{ display:flex; flex-direction:column; gap:20px; max-width:1300px; }
.cmp .row{ display:flex; align-items:center; gap:24px; cursor:default; }
.cmp .when{ width:120px; text-align:right; font-family:'BRSonoma Medium',sans-serif; font-size:22px; color:var(--secondary); }
.cmp .track{ flex:1; height:56px; position:relative; }
.cmp .bar{ height:100%; width:0; border-radius:10px; display:flex; align-items:center; padding-left:24px;
  font-family:'BRSonoma Bold',sans-serif; font-size:22px; color:#fff; transition:width 1s var(--ease), filter .25s var(--ease); white-space:nowrap; }
.cmp .row:hover .bar{ filter:brightness(1.06); }
.cmp .b0{ background:var(--primary); } .cmp .b1{ background:var(--secondary); }
.cmp .b2{ background:var(--accent-orange); } .cmp .b3{ background:var(--tertiary); }

/* 4 · visual generativo (grilla de apuestas) */
.bets{ display:grid; grid-template-columns:repeat(8,1fr); gap:16px; max-width:1400px; }
.bets .cell{ aspect-ratio:1/1; border-radius:14px; position:relative; opacity:0; transform:scale(.7);
  transition:opacity .5s var(--ease), transform .5s var(--ease), filter .2s var(--ease); }
.bets .cell.in{ opacity:1; transform:scale(1); }
.bets .cell.win{ background:var(--neutral); border:1.5px solid var(--line); border-left:4px solid var(--tertiary); }
.bets .cell.fold{ background:var(--bg-soft); border:1.5px dashed #D7DBE3; }
.bets .cell.win::after{ content:""; position:absolute; top:12px; right:12px; width:12px; height:12px; border-radius:999px; background:var(--tertiary); }
.bets .cell.win.in::after{ animation:beat 2.4s var(--ease) infinite; }
.bets .cell:hover{ filter:brightness(1.04); transform:scale(1.05); }
/* pulse on-brand: movimiento del punto rojo, sin glow/box-shadow (design.md §Elevation / anti-slop) */
@keyframes beat{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.32); opacity:.6; } }
.bets-cap{ font-family:'BRSonoma Regular',sans-serif; font-size:18px; color:var(--secondary); margin-top:26px; }
.bets-cap b{ color:var(--tertiary); font-family:'BRSonoma Bold',sans-serif; }

/* 5 · manifiesto (palabra por palabra) — la frase ES el título (sin título arriba) */
.manifesto{ max-width:1500px; }
.manifesto .stmt{ font-family:'BRSonoma Bold',sans-serif; font-size:92px; line-height:1.08; letter-spacing:-.03em; color:var(--neutral); }
.manifesto .stmt .w{ opacity:0; transform:translateY(.18em); display:inline-block; transition:opacity .4s var(--ease), transform .4s var(--ease); }
.manifesto .stmt .w.on{ opacity:1; transform:translateY(0); }
.manifesto .rule{ width:120px; height:6px; background:var(--tertiary); border-radius:999px; margin-top:44px; opacity:0; transition:opacity .6s var(--ease) .2s; }
.manifesto .rule.on{ opacity:1; }
.manifesto .sub{ font-family:'BRSonoma Medium',sans-serif; font-size:26px; color:rgba(255,255,255,.68); margin-top:34px; max-width:1000px; opacity:0; transition:opacity .6s var(--ease) .35s; }
.manifesto .sub.on{ opacity:1; }
.manifesto .sub b{ color:var(--neutral); font-family:'BRSonoma Bold',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Vanilla puro: sin framework, sin build, sin CDN. Cero dependencias externas. -->
<script>
(function(){
  "use strict";

  /* prefers-reduced-motion: las animaciones JS (count-up, secuencias) no las frena el @media CSS → se chequea acá (design.md §Técnica del corazón). */
  const REDUCE = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  const easeOut = p => 1 - Math.pow(1 - p, 3);

  /* helper DOM minimal */
  function el(tag, cls, html){ const e = document.createElement(tag); if(cls) e.className = cls; if(html != null) e.innerHTML = html; return e; }

  /* Logo Rimac (constante única, design.md §Logo). En .dark va en negativo por CSS. */
  const LOGO = `<svg width="230" height="32" viewBox="0 0 230 32" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M41.3493 0C41.0497 0 40.4504 0.243398 40.4504 0.243398C40.3306 0.243398 1.01874 18.3727 1.01874 18.3727C0.359549 18.6769 0 19.1635 0 19.8327C0 20.6844 0.659192 21.3536 1.49816 21.3536C1.65797 21.3536 1.81776 21.2995 1.97755 21.2455C2.05745 21.2184 2.13735 21.1914 2.21725 21.1711C2.27718 21.1711 37.2743 5.96196 37.2743 5.96196L27.0269 27.924C26.8471 28.3498 26.7272 28.7757 26.7272 29.2016C26.7272 30.7225 27.9857 32 29.4839 32C29.7835 32 30.0831 31.9392 30.3827 31.8784C30.3827 31.8784 81.6199 17.2776 81.6799 17.2776C84.3766 16.6084 86.3541 14.1141 86.3541 11.1939C86.3541 7.66538 83.5376 4.86694 80.1218 4.86694C79.2229 4.86694 78.4439 5.04943 77.545 5.41445C77.4851 5.47529 36.0158 23.3612 36.0158 23.3612L43.1471 2.85933C43.267 2.55514 43.3269 2.3118 43.3269 2.00762C43.3269 0.91256 42.428 0 41.3493 0Z" fill="#F7052D"/>
<path d="M175.645 6.26584V28.8362H170.431V12.7145L159.285 28.8362H154.131L149.457 12.6537L142.026 28.8362H135.913L146.88 5.35333C147.659 3.83242 148.438 3.16321 149.936 3.16321C150.955 3.16321 152.034 3.77157 152.513 5.53583L157.307 23.1176L169.772 5.10993C170.851 3.58902 171.749 3.10237 172.948 3.16321C174.266 3.16321 175.585 4.07573 175.585 6.26584H175.645Z" fill="#F7052D"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M113.382 7.48221C118.955 7.48221 120.513 10.7066 120.213 13.5659H120.153C119.854 16.3644 118.176 19.0412 113.322 20.3187L118.835 28.8359H112.782L107.868 20.8054H105.052L103.254 28.8359H97.7407L102.595 7.48221H113.382ZM109.846 17.2161C112.543 17.2161 114.46 15.9385 114.7 13.8701H114.76C114.94 11.8625 113.801 10.7674 111.584 10.7674H107.389L105.891 17.2161H109.846Z" fill="#F7052D"/>
<path d="M134.355 7.48221H128.781L123.867 28.8359H129.501L133.036 13.1401L134.355 7.48221Z" fill="#F7052D"/>
<path d="M219.75 24.8827C215.256 24.8219 212.679 22.1451 213.038 18.6774H213.098C213.578 14.0539 217.593 11.2554 223.166 11.2554C224.784 11.2554 226.941 11.377 228.859 11.9246L229.818 7.60514C228.2 7.17929 225.503 6.87513 223.765 6.87513C214.177 6.87513 208.064 11.5595 207.345 18.5557C206.686 24.7611 210.821 29.2021 219.69 29.2021C221.488 29.2021 222.986 29.0196 225.203 28.6546L226.282 23.9702C224.185 24.5786 222.447 24.8827 219.75 24.8827Z" fill="#F7052D"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M199.015 9.67225C198.356 7.36046 197.038 6.75214 195.659 6.87382C194.82 6.93465 193.922 7.36053 192.963 8.69893L179.659 28.8358H185.112L187.989 24.3339H197.757L198.776 28.8358H204.109L198.955 9.67225H199.015ZM190.326 20.8054L195.36 12.9575L196.978 20.8054H190.326Z" fill="#F7052D"/>
</svg>`;

  /* ===========================================================
     CORAZONES — cada uno es una factory: {el, activate, deactivate}.
     activate() arranca al entrar al slide; deactivate() resetea al salir.
     (equivale al efecto `active` de los hooks React del lab original)
     =========================================================== */

  /* 1 · count-up 99% (rAF) */
  function StatCore(){
    const root = el('div','stat-core');
    const big  = el('div','stat-big grad');
    const num  = document.createTextNode('0');
    big.appendChild(num);
    big.appendChild(el('span','pct','%'));
    const say = el('p','stat-say','del valor llegó tras <b>diez semanas iterando</b> con usuarios cada día — no en el primer prototipo');
    const weeksWrap = el('div','stat-weeks');
    const wks = [];
    for(let i=0;i<10;i++){ const w = el('div','wk'); wks.push(w); weeksWrap.appendChild(w); }
    root.append(big, say, weeksWrap);

    let raf = null;
    function render(v){
      num.nodeValue = String(Math.round(v));
      const lit = Math.round((v/99)*10);
      wks.forEach((w,i)=> w.classList.toggle('on', i < lit));
    }
    return {
      el: root,
      activate(){
        if(REDUCE){ render(99); return; }
        let start = null; const dur = 1500;
        const step = (t)=>{ if(start===null) start=t; const p=Math.min((t-start)/dur,1); render(99*easeOut(p)); if(p<1) raf=requestAnimationFrame(step); };
        raf = requestAnimationFrame(step);
      },
      deactivate(){ if(raf) cancelAnimationFrame(raf); raf=null; render(0); }
    };
  }

  /* 2 · flujo Enviar→Observar→Aprender en loop */
  function FlowCore(){
    const steps = [["Enviar","a producción"],["Observar","con usuarios"],["Aprender","y decidir"]];
    const root = el('div');
    const flow = el('div','flow');
    const nodes = [], links = [];
    steps.forEach((s,i)=>{
      const node = el('div','node');
      node.append(el('div','dot',String(i+1)), el('div','lbl',s[0]), el('div','sub',s[1]));
      nodes.push(node); flow.appendChild(node);
      if(i < steps.length-1){ const link = el('div','link'); link.appendChild(el('div','fill')); links.push(link); flow.appendChild(link); }
    });
    const back = el('div','back','<span class="loop">↻</span> y otra vez — 50 a 100 vueltas en diez semanas');
    root.append(flow, back);

    let timer = null;
    function render(cur){
      nodes.forEach((n,i)=>{ n.classList.toggle('on', i<=cur); n.classList.toggle('now', i===cur); });
      links.forEach((l,i)=> l.classList.toggle('on', i < cur));
    }
    return {
      el: root,
      activate(){
        render(0);
        if(REDUCE){ render(steps.length-1); return; }   /* sin loop: muestra el ciclo completo, estático */
        let k = 0;
        timer = setInterval(()=>{ k++; if(k >= steps.length) k = 0; render(k); }, 850);
      },
      deactivate(){ if(timer) clearInterval(timer); timer=null; render(0); }
    };
  }

  /* 3 · comparativa de barras 6 meses → 1 día */
  function CompareCore(){
    const rows = [
      {when:"antes",   cls:"b0", w:"94%", txt:"6 meses"},
      {when:"luego",   cls:"b1", w:"46%", txt:"1 mes"},
      {when:"después", cls:"b2", w:"20%", txt:"1 semana"},
      {when:"hoy",     cls:"b3", w:"8%",  txt:"1 día"},
    ];
    const root = el('div','cmp');
    const bars = [];
    rows.forEach((r,i)=>{
      const row = el('div','row');
      row.appendChild(el('div','when',r.when));
      const track = el('div','track');
      const bar = el('div','bar '+r.cls, r.txt);
      bar.style.transitionDelay = (i*0.12)+'s';
      bar.style.width = '0%';
      bars.push({bar, w:r.w});
      track.appendChild(bar);
      row.appendChild(track);
      root.appendChild(row);
    });

    let timer = null;
    function open(){ bars.forEach(b=> b.bar.style.width = b.w); }
    return {
      el: root,
      activate(){
        if(REDUCE){ open(); return; }
        timer = setTimeout(open, 120);
      },
      deactivate(){ if(timer) clearTimeout(timer); timer=null; bars.forEach(b=> b.bar.style.width = '0%'); }
    };
  }

  /* 4 · grilla generativa de apuestas (8×3; ~9 ganan, el resto se pliega) */
  function BetsCore(){
    const wins = new Set([0,2,5,8,11,13,16,19,22]);
    const root = el('div');
    const grid = el('div','bets');
    const cells = [];
    for(let i=0;i<24;i++){
      const c = el('div','cell '+(wins.has(i)?'win':'fold'));
      c.style.transitionDelay = (i*0.035)+'s';
      cells.push(c); grid.appendChild(c);
    }
    const cap = el('p','bets-cap','La mayoría se <b>pliega</b> — y está bien. Unas pocas se <b>doblan</b> y se vuelven producto.');
    root.append(grid, cap);

    let timer = null;
    function reveal(){ cells.forEach(c=> c.classList.add('in')); }
    return {
      el: root,
      activate(){
        if(REDUCE){ reveal(); return; }
        timer = setTimeout(reveal, 100);
      },
      deactivate(){ if(timer) clearTimeout(timer); timer=null; cells.forEach(c=> c.classList.remove('in')); }
    };
  }

  /* 5 · manifiesto oscuro palabra-por-palabra (la frase ES el título; logo en negativo por .dark) */
  function ManifestoCore(){
    const root = el('div','manifesto');
    const words = "La velocidad no evita el error — lo hace barato".split(" ");
    const stmt = el('p','stmt');
    const wordEls = [];
    words.forEach((w,i)=>{
      const sp = el('span','w');
      sp.textContent = w;
      wordEls.push(sp); stmt.appendChild(sp);
      /* el espacio va como nodo de texto ENTRE spans: dentro de un inline-block el espacio final se colapsa → si no, las palabras se pegan */
      if(i < words.length-1) stmt.appendChild(document.createTextNode(" "));
    });
    const rule = el('div','rule');
    const sub  = el('p','sub','Cuando el ciclo dura <b>una semana</b>, equivocarse cuesta días — no un trimestre.');
    root.append(stmt, rule, sub);

    let timer = null;
    function render(cur){
      wordEls.forEach((s,i)=> s.classList.toggle('on', i <= cur));
      rule.classList.toggle('on', cur >= words.length);
      sub.classList.toggle('on', cur >= words.length+1);
    }
    return {
      el: root,
      activate(){
        render(-1);
        if(REDUCE){ render(words.length+1); return; }   /* todo revelado, sin secuencia */
        let k = -1; const n = words.length + 4;
        timer = setInterval(()=>{ k++; if(k >= n){ clearInterval(timer); timer=null; k = n-1; } render(k); }, 150);
      },
      deactivate(){ if(timer) clearInterval(timer); timer=null; render(-1); }
    };
  }

  /* ===========================================================
     MARCO + DECK (bloqueado: título franja superior sin eyebrow,
     footer+branding, pagenum, riseIn, stage 1920×1080)
     =========================================================== */

  const SLIDES = [
    { title:"Casi todo el valor llega <span class='grad'>después de lanzar</span>", core:StatCore },
    { title:"El bucle que <span class='red'>comprime</span> el tiempo",            core:FlowCore },
    { title:"De seis meses <span class='grad'>a un día</span>",                    core:CompareCore },
    { title:"Una <span class='red'>fábrica de apuestas</span> en el laboratorio",  core:BetsCore },
    { title:null, dark:true,                                                        core:ManifestoCore }, /* manifiesto: la frase ES el título */
  ];

  function footer(){
    const f = el('div','footer');
    f.append(el('div','logo',LOGO), el('div','sep'), el('span','tag','CoE Diseño Estratégico'));
    return f;
  }

  const viewport = el('div','viewport');
  const stage = el('div','stage');
  viewport.appendChild(stage);

  const total = SLIDES.length;
  const built = [];
  SLIDES.forEach((s,i)=>{
    const section = el('section', 'slide'+(s.dark?' dark':''));
    if(s.title) section.appendChild(el('h2','title reveal', s.title));
    const inst = s.core();
    const wrap = el('div','core reveal');
    wrap.appendChild(inst.el);
    section.appendChild(wrap);
    section.appendChild(footer());
    section.appendChild(el('div','pagenum', String(i+1).padStart(2,"0")+" / "+String(total).padStart(2,"0")));
    stage.appendChild(section);
    built.push({section, core:inst});
  });

  document.getElementById('root').appendChild(viewport);

  /* ---- navegación / fit ---- */
  let cur = -1;
  function show(idx){
    idx = Math.max(0, Math.min(idx, total-1));
    if(idx === cur) return;
    built.forEach((b,i)=>{
      const active = i === idx;
      b.section.classList.toggle('active', active);
      b.core.deactivate();          /* resetea siempre... */
      if(active) b.core.activate();  /* ...y reanima solo el actual */
    });
    cur = idx;
  }

  function fit(){
    const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    stage.style.transform = 'scale('+s+')';
  }
  fit();
  window.addEventListener('resize', fit);
  show(0);

  window.addEventListener('keydown', (e)=>{
    if(["ArrowRight"," ","PageDown"].includes(e.key)){ e.preventDefault(); show(cur+1); }
    else if(["ArrowLeft","PageUp"].includes(e.key)){ e.preventDefault(); show(cur-1); }
    else if(e.key === "Home"){ show(0); }
    else if(e.key === "End"){ show(total-1); }
  });

  let tx = 0;
  window.addEventListener('touchstart', (e)=>{ tx = e.touches[0].clientX; }, {passive:true});
  window.addEventListener('touchend', (e)=>{
    const dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 40){ dx < 0 ? show(cur+1) : show(cur-1); }
  });
})();
</script>
</body>
</html>
